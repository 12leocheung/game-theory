// MINIGAME DEFINITIONS
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S={
  user: null,
  roomCode: null,
  isHost: false,
  p1Score: 0,
  p2Score: 0,
  round: 0,
  gameOrder: [],
  myChoice: null,
  theirChoice: null,
  timerInterval: null,
  timerVal: 0,
  phase: 'idle',
  ultRole: null, ultOffer: null,
  auctMyBid: 0, auctTheirBid: 0, auctMyPassed: false, auctTheirPassed: false,
  centPot: 2, centRound: 0, centMyTurn: false, centMaxRounds: 8,
  sigRole: null, sigType: null, sigReceivedSignal: null, sigReceivedBluff: null,
  unsubscribeRoom: null,
  lastRematchSeed: null
};

let CG = null;

// ═══════════════════════════════════════════════════════
// FIREBASE LOGIC
// ═══════════════════════════════════════════════════════

async function initAuth() {
  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
    await signInWithCustomToken(auth, __initial_auth_token);
  } else {
    await signInAnonymously(auth);
  }
}

onAuthStateChanged(auth, (u) => {
  if (u) {
    S.user = u;
    setStatus('peer', '✓ AUTHENTICATED', 'ok');
    document.getElementById('joinBtn').disabled = false;
    document.getElementById('roomIdDisplay').textContent = makeRoomCode();
  }
});

function makeRoomCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = ''; for (let i = 0; i < 6; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}

async function createRoom() {
  const code = document.getElementById('roomIdDisplay').textContent;
  if (!S.user) return;
  S.roomCode = code;
  S.isHost = true;
  
  const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
  await setDoc(roomRef, {
    hostId: S.user.uid,
    status: 'waiting',
    createdAt: Date.now()
  });
  
  listenToRoom(code);
  setStatus('peer', '✓ WAITING FOR OPPONENT...', 'waiting');
}

async function joinRoom() {
  const code = document.getElementById('joinInput').value.trim().toUpperCase();
  if (!S.user || code.length < 3) return;
  
  const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
  const snap = await getDoc(roomRef);
  
  if (!snap.exists()) {
    setStatus('join', 'ROOM NOT FOUND', 'error');
    return;
  }
  
  const data = snap.data();
  if (data.guestId && data.guestId !== S.user.uid) {
    setStatus('join', 'ROOM FULL', 'error');
    return;
  }

  S.roomCode = code;
  S.isHost = false;
  
  const seed = Date.now();
  await updateDoc(roomRef, {
    guestId: S.user.uid,
    status: 'playing',
    seed: seed
  });
  
  listenToRoom(code);
  setStatus('join', '✓ CONNECTING...', 'ok');
}

function listenToRoom(code) {
  const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
  S.unsubscribeRoom = onSnapshot(roomRef, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    
    // Check for start
    if (data.status === 'playing' && S.phase === 'idle') {
      startGame(data.seed);
    }
    
    // Sync Game State
    const oppKey = S.isHost ? 'guestChoice' : 'hostChoice';
    if (data[oppKey] !== undefined && data[oppKey] !== null) {
        if (JSON.stringify(data[oppKey]) !== JSON.stringify(S.theirChoice)) {
            S.theirChoice = data[oppKey];
            handleNetworkUpdate(data[oppKey]);
        }
    }

    // Rematch
    if (data.rematchSeed && data.rematchSeed !== S.lastRematchSeed) {
      S.lastRematchSeed = data.rematchSeed;
      startGame(data.rematchSeed);
    }
  }, (err) => console.error("Room listener error:", err));
}

function handleNetworkUpdate(val) {
    if (CG && CG.type === 'ultimatum' && S.ultRole === 'responder' && typeof val === 'number') {
        rcvUltOffer(val);
    } else if (CG && CG.type === 'signaling' && S.sigRole === 'receiver' && val && val.type === 'signal') {
        rcvSignal(val.signal, val.bluff);
    } else if (CG && CG.type === 'auction' && val && val.type === 'bid') {
        S.auctTheirBid = val.val;
        drawAuction();
    } else if (CG && CG.type === 'auction' && val && val.type === 'pass') {
        S.auctTheirPassed = true;
        resolveAuction();
    } else if (CG && CG.type === 'centipede' && val === 'take') {
        resolveCent('take', false);
    } else if (CG && CG.type === 'centipede' && val === 'pass') {
        S.centPot *= 2; S.centRound++; S.centMyTurn = true; drawCentipede();
    } else {
        checkBoth();
    }
}

async function submitChoice(val) {
  if (!S.roomCode) return;
  const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', S.roomCode);
  const key = S.isHost ? 'hostChoice' : 'guestChoice';
  await updateDoc(roomRef, { [key]: val });
}

async function clearChoices() {
  if (!S.roomCode) return;
  const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', S.roomCode);
  await updateDoc(roomRef, { hostChoice: null, guestChoice: null });
}

// ═══════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════

function startGame(seed){
  const rng=seededRng(seed);
  S.gameOrder=shuffle(GAMES,rng);
  S.round=0; S.p1Score=0; S.p2Score=0;
  S.phase = 'active';
  updateSB();
  showScreen('game');
  nextRound();
}

async function nextRound(){
  if(S.round>=GAMES.length){endGame();return;}
  const g=S.gameOrder[S.round];
  S.myChoice=null; S.theirChoice=null; S.phase='choosing';
  await clearChoices();
  clearInterval(S.timerInterval);

  const rt=document.getElementById('roundTransition');
  document.getElementById('rtNum').textContent=S.round+1;
  document.getElementById('rtName').textContent=g.name;
  rt.classList.add('show');

  setTimeout(()=>{
    rt.classList.remove('show');
    S.round++;
    document.getElementById('roundNum').textContent=`${S.round}/12`;
    CG=g;
    loadGame(g);
  },2400);
}

function loadGame(g){
  document.getElementById('gameTitle').textContent=g.name;
  document.getElementById('conceptTag').textContent=g.concept.toUpperCase();
  const body=document.getElementById('gameBody');

  if(g.type.startsWith('sim_choice')) renderSimChoice(g,body);
  else if(g.type=='number') renderNumber(g,body);
  else if(g.type=='slider') renderSlider(g,body);
  else if(g.type=='ultimatum') renderUltimatum(g,body);
  else if(g.type=='auction') renderAuction(g,body);
  else if(g.type=='centipede') renderCentipede(g,body);
  else if(g.type=='signaling') renderSignaling(g,body);

  startTimer(g.timer);
}

// RENDERERS
function renderSimChoice(g,body){
  let role = (g.id=='matching_pennies') ? `<div class="role-badge ${S.isHost?'p1':'p2'}">${S.isHost?'YOU ARE EVENER':'YOU ARE ODDER'}</div>` : '';
  body.innerHTML=`<div class="game-desc">${g.desc}</div>${role}
    <div class="choices grid2">${g.choices.map(c=>`<button class="choice-btn" id="cb_${c.v}" onclick="doChoice('${c.v}')"><span class="ce">${c.e}</span><span class="cl">${c.l}</span><span class="cs">${c.s}</span></button>`).join('')}</div>
    <div class="waiting-msg" id="wm" style="display:none">⌛ WAITING FOR OPPONENT...</div>`;
}

function renderNumber(g,body){
  body.innerHTML=`<div class="game-desc">${g.desc}</div>
    <input type="number" id="numInput" min="${g.min}" max="${g.max}" value="${g.defVal}"/>
    <div style="margin-top:12px"><button class="btn cyan" id="numBtn" onclick="doNumber(parseInt(document.getElementById('numInput').value))">→ LOCK IN NUMBER</button></div>
    <div class="waiting-msg" id="wm" style="display:none">⌛ WAITING...</div>`;
}

function renderSlider(g,body){
  body.innerHTML=`<div class="game-desc">${g.desc}</div>
    <div class="slider-wrap">
      <label>${g.sliderLabel}</label>
      <input type="range" id="slInput" min="${g.sliderMin}" max="${g.sliderMax}" value="${g.sliderDefault}" oninput="document.getElementById('slVal').textContent=this.value"/>
      <div class="slider-val" id="slVal">${g.sliderDefault}</div>
    </div>
    <button class="btn yellow" id="slBtn" onclick="doSlider(parseInt(document.getElementById('slInput').value))">→ CONTRIBUTE</button>
    <div class="waiting-msg" id="wm" style="display:none">⌛ WAITING...</div>`;
}

function renderUltimatum(g,body){
  S.ultRole=S.isHost?'proposer':'responder';
  if(S.ultRole=='proposer'){
    body.innerHTML=`<div class="game-desc">${g.desc}</div>
      <div class="role-badge p1">💬 PROPOSER</div>
      <div class="slider-wrap">
        <input type="range" id="ultSlider" min="0" max="10" value="5" oninput="document.getElementById('ultGive').textContent=this.value"/>
        <div style="text-align:center"><div class="score-name">THEY GET</div><div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--p2)" id="ultGive">5</div></div>
      </div>
      <button class="btn primary" id="ultBtn" onclick="doUltOffer(parseInt(document.getElementById('ultSlider').value))">→ SEND OFFER</button>`;
  } else {
    body.innerHTML=`<div class="game-desc">${g.desc}</div>
      <div class="role-badge p2">👂 RESPONDER</div>
      <div class="waiting-msg" id="wm">⌛ WAITING FOR PROPOSER'S OFFER...</div>
      <div id="offerArea" style="display:none">
        <div class="auction-display"><div class="auction-item" id="offerAmt">?</div><div class="auction-value">OFFERED TO YOU</div></div>
        <div class="choices grid2">
          <button class="choice-btn" onclick="doUltResp(true)"><span class="ce">✅</span><span class="cl">ACCEPT</span></button>
          <button class="choice-btn" onclick="doUltResp(false)"><span class="ce">❌</span><span class="cl">REJECT</span></button>
        </div>
      </div>`;
  }
}

function renderAuction(g,body){
  S.auctMyBid=0; S.auctTheirBid=0; S.auctMyPassed=false; S.auctTheirPassed=false;
  drawAuction(body);
}

function drawAuction(body){
  if(!body) body=document.getElementById('gameBody');
  body.innerHTML=`<div class="game-desc">${CG.desc}</div>
    <div class="auction-display"><div class="auction-item">🏆</div><div class="auction-value">8 PTS PRIZE</div></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:15px">
        <div style="text-align:center"><div class="score-name">YOUR BID</div><div style="font-size:30px;font-family:'Bebas Neue'">${S.auctMyBid}</div></div>
        <div style="text-align:center"><div class="score-name">OPP BID</div><div style="font-size:30px;font-family:'Bebas Neue'">${S.auctTheirBid}</div></div>
    </div>
    <div class="choices grid2">
      <button class="choice-btn" onclick="doAuctBid()"><span class="ce">📈</span><span class="cl">RAISE</span></button>
      <button class="choice-btn" onclick="doAuctPass()"><span class="ce">🏳️</span><span class="cl">PASS</span></button>
    </div>`;
}

function renderCentipede(g,body){
    S.centPot=2; S.centRound=0; S.centMyTurn=S.isHost;
    drawCentipede(body);
}

function drawCentipede(body){
    if(!body) body=document.getElementById('gameBody');
    body.innerHTML=`<div class="game-desc">${CG.desc}</div>
    <div class="auction-display"><div class="auction-item">${S.centPot} PTS</div></div>
    ${S.centMyTurn?`
    <div class="choices grid2">
        <button class="choice-btn" onclick="doCentTake()"><span class="ce">💰</span><span class="cl">TAKE</span></button>
        <button class="choice-btn" onclick="doCentPass()"><span class="ce">➡️</span><span class="cl">PASS</span></button>
    </div>` : '<div class="waiting-msg">⌛ OPPONENT\'S TURN...</div>'}`;
}

function renderSignaling(g,body){
    S.sigRole = S.isHost ? 'sender' : 'receiver';
    if(S.sigRole=='sender'){
        S.sigType = Math.random() > 0.4 ? 'strong' : 'weak';
        body.innerHTML=`<div class="game-desc">You are ${S.sigType.toUpperCase()}.</div>
        <div class="choices grid2">
            <button class="choice-btn" onclick="doSigSend('strong')"><span class="ce">💪</span><span class="cl">SIGNAL STRONG</span></button>
            <button class="choice-btn" onclick="doSigSend('weak')"><span class="ce">😟</span><span class="cl">SIGNAL WEAK</span></button>
        </div>`;
    } else {
        body.innerHTML=`<div class="waiting-msg">Waiting for signal...</div>`;
    }
}

// HANDLERS
async function doChoice(v){
  if(S.myChoice) return;
  S.myChoice = v;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  stopTimer();
  await submitChoice(v);
  if(document.getElementById('wm')) document.getElementById('wm').style.display='block';
  checkBoth();
}

async function doNumber(v){ doChoice(v); }
async function doSlider(v){ doChoice(v); }
async function doUltOffer(v){ 
    S.myChoice = v;
    stopTimer();
    await submitChoice(v); 
    const body=document.getElementById('gameBody');
    body.innerHTML += '<div class="waiting-msg">⌛ OFFER SENT...</div>';
}
async function rcvUltOffer(v){
    if(document.getElementById('wm')) document.getElementById('wm').style.display='none';
    if(document.getElementById('offerAmt')) document.getElementById('offerAmt').textContent = v + " PTS";
    if(document.getElementById('offerArea')) document.getElementById('offerArea').style.display='block';
}
async function doUltResp(accept){
    const res = { accept, offer: S.theirChoice };
    S.myChoice = res;
    await submitChoice(res);
    resolveUlt(accept, S.theirChoice);
}
function resolveUlt(accept, offer){
    let mp, tp;
    if(accept){ mp=S.ultRole=='proposer'?10-offer:offer; tp=S.ultRole=='proposer'?offer:10-offer; }
    else { mp=0; tp=0; }
    awardAndShow(mp, tp, accept?'ACCEPTED':'REJECTED', '', CG.explain);
}

async function doAuctBid(){
    S.auctMyBid++;
    await submitChoice({type:'bid', val:S.auctMyBid});
    drawAuction();
}
async function doAuctPass(){
    S.auctMyPassed=true;
    await submitChoice({type:'pass'});
    resolveAuction();
}
function resolveAuction(){
    const mb=S.auctMyBid, tb=S.auctTheirBid;
    let mp, tp;
    if(mb > tb) { mp=8-mb; tp=-tb; }
    else { mp=-mb; tp=8-tb; }
    awardAndShow(mp, tp, mb>tb?'YOU WON':'OPP WON', '', CG.explain);
}

async function doCentTake(){
    await submitChoice('take');
    resolveCent('take', true);
}
async function doCentPass(){
    await submitChoice('pass');
    S.centPot *= 2; S.centMyTurn=false; drawCentipede();
}
function resolveCent(action, isMine){
    let mp, tp;
    if(action==='take'){
        mp=isMine?Math.ceil(S.centPot*.6):Math.floor(S.centPot*.4);
        tp=isMine?Math.floor(S.centPot*.4):Math.ceil(S.centPot*.6);
    } else {
        mp=S.centPot/2; tp=S.centPot/2;
    }
    awardAndShow(mp, tp, action==='take'?'POT TAKEN':'TIME EXPIRED', '', CG.explain);
}

async function doSigSend(sig){
    S.myChoice = {type:'signal', signal:sig, bluff:(sig==='strong' && S.sigType==='weak')};
    await submitChoice(S.myChoice);
    document.getElementById('gameBody').innerHTML = '<div class="waiting-msg">⌛ SIGNAL SENT...</div>';
}
function rcvSignal(sig, bluff){
    S.sigReceivedSignal = sig; S.sigReceivedBluff = bluff;
    const body = document.getElementById('gameBody');
    body.innerHTML = `<div class="auction-display"><div class="auction-item">${sig==='strong'?'💪':'😟'}</div></div>
    <div class="choices grid2">
        <button class="choice-btn" onclick="doSigResp(true)"><span class="cl">TRUST</span></button>
        <button class="choice-btn" onclick="doSigResp(false)"><span class="cl">DISTRUST</span></button>
    </div>`;
}
async function doSigResp(trust){
    S.myChoice = trust;
    await submitChoice(trust);
    resolveSig(trust);
}
function resolveSig(trust){
    let mp, tp;
    const isSender = S.sigRole==='sender';
    const isBluff = isSender ? S.myChoice.bluff : S.sigReceivedBluff;
    const trusted = isSender ? S.theirChoice : S.myChoice;
    
    if(trusted && !isBluff) { mp=isSender?4:2; tp=isSender?2:4; }
    else if(trusted && isBluff) { mp=isSender?5:0; tp=isSender?0:5; }
    else if(!trusted && !isBluff) { mp=isSender?1:3; tp=isSender?3:1; }
    else { mp=isSender?0:4; tp=isSender?4:0; }
    
    awardAndShow(mp, tp, trusted?'TRUSTED':'DISTRUSTED', '', CG.explain);
}

function checkBoth(){
  if(S.myChoice === null || S.theirChoice === null) return;
  const g=CG;
  clearInterval(S.timerInterval);
  let res;
  if(g.type=='sim_choice') res=g.resolve(S.myChoice, S.theirChoice);
  else if(g.type=='sim_choice_asymmetric' || g.type=='sim_choice_zerosum') res=g.resolve(S.myChoice, S.theirChoice, S.isHost);
  else if(g.type=='number' || g.type=='slider') res=g.resolve(S.myChoice, S.theirChoice);
  
  if(res) awardAndShow(res.me, res.them, res.o, '', g.explain);
}

function awardAndShow(myPts, theirPts, outcome, extra, explain){
  if (S.phase === 'resolving') return;
  S.phase='resolving';
  if(S.isHost){ S.p1Score+=myPts; S.p2Score+=theirPts; }
  else{ S.p2Score+=myPts; S.p1Score+=theirPts; }
  updateSB();

  const win = myPts > theirPts;
  const draw = myPts === theirPts;
  document.getElementById('resultTitle').textContent = win ? 'ROUND WIN' : (draw ? 'DRAW' : 'ROUND LOSS');
  document.getElementById('resultTitle').className = 'result-title '+(win?'win':(draw?'draw':'lose'));
  document.getElementById('resultOutcome').textContent = outcome;
  document.getElementById('resultExplain').textContent = explain;
  document.getElementById('resultPts').textContent = `+${Math.max(0,myPts)} pts / +${Math.max(0,theirPts)} pts`;
  document.getElementById('resultOverlay').classList.add('show');

  setTimeout(()=>{
    document.getElementById('resultOverlay').classList.remove('show');
    nextRound();
  },4000);
}

function updateSB(){
  document.getElementById('p1score').textContent=Math.round(S.p1Score*10)/10;
  document.getElementById('p2score').textContent=Math.round(S.p2Score*10)/10;
  document.getElementById('p1label').textContent=S.isHost?'YOU':'OPP';
  document.getElementById('p2label').textContent=S.isHost?'OPP':'YOU';
}

function startTimer(secs){
  clearInterval(S.timerInterval);
  S.timerVal=secs;
  const el=document.getElementById('gameTimer');
  el.textContent=S.timerVal; el.className='game-timer';
  S.timerInterval=setInterval(()=>{
    S.timerVal--;
    el.textContent=S.timerVal;
    if(S.timerVal<=5) el.className='game-timer urgent';
    if(S.timerVal<=0){ clearInterval(S.timerInterval); autoTimeout(); }
  },1000);
}

function stopTimer(){
  clearInterval(S.timerInterval);
  document.getElementById('gameTimer').textContent='✓';
}

function autoTimeout(){
  if(S.myChoice === null) {
      if (CG.choices) doChoice(CG.choices[0].v);
      else if (CG.type === 'number') doNumber(CG.defVal);
      else if (CG.type === 'slider') doSlider(CG.sliderDefault);
  }
}

// HELPERS
function seededRng(seed){
  let s=seed%2147483647; if(s<=0)s+=2147483646;
  return()=>{s=s*16807%2147483647; return(s-1)/2147483646;};
}
function shuffle(arr,rng){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function setStatus(id,txt,cls){
  const el=document.getElementById(id+'Status');
  if(el){el.textContent=txt; el.className='status-line '+(cls||'');}
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

function copyRoomId(){
  const id=document.getElementById('roomIdDisplay').textContent;
  navigator.clipboard.writeText(id);
  const f=document.getElementById('copyFlash'); f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),1400);
}

function toggleGamesList(){
  const p=document.getElementById('gamesListPanel');
  const g=document.getElementById('gamePreviewGrid');
  if(p.style.display=='none'){
    p.style.display='block';
    if(!g.innerHTML)g.innerHTML=GAMES.map(g=>`<div class="gpi"><div class="gp-icon">${g.icon}</div><div class="gp-name">${g.name}</div><div class="gp-concept">${g.concept}</div></div>`).join('');
  }else p.style.display='none';
}

async function rematch() {
  if (S.isHost) {
    const seed = Date.now();
    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', S.roomCode);
    await updateDoc(roomRef, { rematchSeed: seed });
  }
}

function endGame(){
  showScreen('gameover');
  const myS = S.isHost ? S.p1Score : S.p2Score;
  const opS = S.isHost ? S.p2Score : S.p1Score;
  document.getElementById('finalP1').textContent=S.p1Score;
  document.getElementById('finalP2').textContent=S.p2Score;
  const win = myS > opS;
  document.getElementById('finalTitle').textContent = win ? '🏆 VICTORY' : '🤝 MATCH OVER';
}

// Global exposure
window.showScreen = showScreen;
window.joinRoom = joinRoom;
window.createRoom = createRoom;
window.copyRoomId = copyRoomId;
window.toggleGamesList = toggleGamesList;
window.doChoice = doChoice;
window.doNumber = doNumber;
window.doSlider = doSlider;
window.doUltOffer = doUltOffer;
window.doUltResp = doUltResp;
window.doAuctBid = doAuctBid;
window.doAuctPass = doAuctPass;
window.doCentTake = doCentTake;
window.doCentPass = doCentPass;
window.doSigSend = doSigSend;
window.doSigResp = doSigResp;
window.rematch = rematch;

// Init
initAuth();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
:root{--bg:#0a0a0f;--panel:#12121a;--border:#2a2a3a;--accent:#ff3c6e;--accent2:#00e5ff;--accent3:#ffe600;--green:#00ff88;--text:#e8e8f0;--muted:#666680;--p1:#ff3c6e;--p2:#00e5ff}

@keyframes titlePulse{0%,100%{filter:drop-shadow(0 0 40px rgba(255,60,110,.4))}50%{filter:drop-shadow(0 0 60px rgba(0,229,255,.6))}}

.menu-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:14px 24px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}

.room-id-display{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:8px;color:var(--accent3);text-align:center;padding:16px;border:1px dashed var(--border);margin:12px 0;cursor:pointer}
input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:12px 16px;letter-spacing:3px;outline:none}
.status-line{font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.scoreboard{width:100%;max-width:600px;display:flex;gap:8px;position:sticky;top:0;z-index:100;background:var(--bg);padding:10px 0;margin:0 auto}
.score-panel{flex:1;padding:10px 14px;border:1px solid;display:flex;flex-direction:column;align-items:center}
.score-panel.p1{border-color:var(--p1);background:rgba(255,60,110,.05)}
.score-panel.p2{border-color:var(--p2);background:rgba(0,229,255,.05)}

.score-panel.p1 .score-val{color:var(--p1)}
.score-panel.p2 .score-val{color:var(--p2)}
.score-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px}
.round-label{font-size:10px;color:var(--muted)}
.round-num{font-family:'Bebas Neue',sans-serif;font-size:22px}
.game-container{width:100%;max-width:600px;border:1px solid var(--border);background:var(--panel);overflow:hidden;margin:10px auto}

.choices{display:grid;gap:8px;margin:14px 0}
.choices.grid2{grid-template-columns:1fr 1fr}

.choice-btn .ce{font-size:22px;display:block;margin-bottom:5px}
/* FIXED WRAPPER STYLES FOR BUTTON TEXT */
.choice-btn .cl{display:block; font-weight: bold;}
.choice-btn .cs{font-size:9px;color:var(--muted);display:block;margin-top:3px}
.choice-btn.selected{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}
.result-overlay{position:fixed;inset:0;background:rgba(10,10,15,.95);flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:18px;display:none}
.result-overlay.show{display:flex}
.result-title{font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:6px}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);outline:none;border-radius:0}

</style>
</head>

      <div><div class="score-name">OPP</div><div class="final-score" style="color:var(--p2)" id="finalP2">0</div></div>

      <button class="btn green" onclick="rematch()">↺ REMATCH</button>
      <button class="btn" onclick="showScreen('title')">⌂ MAIN MENU</button>
